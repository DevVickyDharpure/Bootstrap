<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class two </title>
    <!-- CSS LINK -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .bg-red {
            background-color: red;
        }

        .bg-green {
            background-color: green;
        }

        .bg-yello {
            background-color: yellow;
        }

        .bg-blue {
            background-color: lightblue;
        }

        .header-hight {
            height: 80px;
        }

        .c-height {
            height: 500px;
            

        }
    </style>

</head>

<body>

    <div class="row">
        <div class="header-hight col-md-3 bg-blue"></div>
        <div class="header-hight col-md-3 bg-green"></div>
        <div class="header-hight col-md-3 bg-red"></div>
        <div class="header-hight col-md-3 bg-yello"></div>

        <div class="c-height bg-yello"></div>
        <div class="c-height bg-blue"></div>
        <div class="c-height bg-green" ></div>
        <div class="c-height"></div>
    </div>


    <!-- javascript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
