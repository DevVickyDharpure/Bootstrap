<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Clone</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons (IMPORTANT) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container col-md-4 border">
      <!-- Navbar -->
      <div class="d-flex justify-content-between align-items-center py-3">
        <h4 class="mb-0">instagram</h4>
        <div class="d-flex gap-2">
          <i class="bi bi-heart"></i>
          <i class="bi bi-chat-dots"></i>
        </div>
      </div>

      <!-- Stories -->
      <div class="d-flex overflow-auto mb-3">
        <div class="text-center me-3">
          <img
            src="https://assets.sbs.com.au/dims4/default/5d85ad4/2147483647/strip/true/crop/638x359+0+0/resize/1280x720!/quality/90/?url=https%3A%2F%2Fsbs-au-brightspot.s3.ap-southeast-2.amazonaws.com%2Ff0%2Fba%2F52229bf44d06aa9b9a0e767473d1%2Fsanjay-gettyimages-2232189206.jpg"
            height="70"
            width="70"
            class="rounded-circle"
          />
          <small>You</small>
        </div>

        <div class="text-center me-3">
          <img                        
            src="https://static.spotboye.com/uploads/salman-kan_2025-6-23-11-23-11_thumbnail.jpg"
            height="70"
            width="70"
            class="rounded-circle"
          />
          <small>User 1</small>
        </div>

        <div class="text-center me-3">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTqeQg3mZYEzmviNM5XbloqDPRAQ3PXQkmpbnkEID8Lahk7gX3Vj-rYF3yhDUBXBe4MDPjGGpbdC0r4XtdWoE7jLB5yqLRJqp4-QvxpkjE&s=10"
            height="70"
            width="70"
            class="rounded-circle"
          />
          <small>User 2</small>
        </div>

        <div class="text-center me-3">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTqeQg3mZYEzmviNM5XbloqDPRAQ3PXQkmpbnkEID8Lahk7gX3Vj-rYF3yhDUBXBe4MDPjGGpbdC0r4XtdWoE7jLB5yqLRJqp4-QvxpkjE&s=10"
            height="70"
            width="70"
            class="rounded-circle"
          />
          <small>User 3</small>
        </div>
      </div>

      <!-- Post -->
      <div class="card mb-4">
        <!-- Post Header -->
        <div class="d-flex align-items-center p-2">
         <div class="d-flex  "></div>
          <strong>User 1</strong>
        </div>
      </div>

    </div>
  </body>
</html>
