    />

  <body>
    <!--  -->
    <header class="d-flex justify-content-center py-3"> <ul class="nav nav-pills"> <li class="nav-item"><a href="#" class="nav-link active" aria-current="page">Home</a></li> <li class="nav-item"><a href="#" class="nav-link">Features</a></li> <li class="nav-item"><a href="#" class="nav-link">Pricing</a></li> <li class="nav-item"><a href="#" class="nav-link">FAQs</a></li> <li class="nav-item"><a href="#" class="nav-link">About</a></li> </ul> </header>
    <div class="row">
      <!-- box one  -->

      <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
      />

      <section id="contact-info" class="py-5 bg-light">
        <div class="container">
          <!-- Section Title -->
          <div class="text-center mb-5">
            <h2 class="fw-bold">Contact Us</h2>
            <p class="text-muted">Reach out to us anytime</p>
          </div>

          <div class="row g-4">
            <!-- Contact Cards -->
            <div class="col-md-4">
              <div class="card border-0 shadow text-center p-4 h-100">
                <div class="mb-3 fs-1 text-primary">📍</div>
                <h5 class="fw-bold">Address</h5>
                <p class="text-muted">Nagpur, Maharashtra, India</p>
              </div>
            </div>

            <div class="col-md-4">
              <div class="card border-0 shadow text-center p-4 h-100">
                <div class="mb-3 fs-1 text-success">📞</div>
                <h5 class="fw-bold">Call Us</h5>
                <p class="text-muted">+91 98765 43210</p>
              </div>
            </div>

            <div class="col-md-4">
              <div class="card border-0 shadow text-center p-4 h-100">
                <div class="mb-3 fs-1 text-danger">✉</div>
                <h5 class="fw-bold">Email</h5>
                <p class="text-muted">contact@example.com</p>
              </div>
            </div>
          </div>

          <!-- Social Links -->
          <div class="text-center mt-5">
            <h5 class="mb-3">Follow Us</h5>
            <a href="#" class="btn btn-outline-primary me-2">Facebook</a>
            <a href="#" class="btn btn-outline-info me-2">Twitter</a>
            <a href="#" class="btn btn-outline-danger">Instagram</a>
          </div>

          <!-- Map -->
          <div class="mt-5">
            <iframe
              src="https://maps.google.com/maps?q=Nagpur&t=&z=13&ie=UTF8&iwloc=&output=embed"
              height="300"
              style="border: 0; width: 100%; border-radius: 10px"
              allowfullscreen=""
            >
            </iframe>
          </div>
        </div>
